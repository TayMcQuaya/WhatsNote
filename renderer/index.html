<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' file: data:">
  <title>WhatsNote</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <img src="../assets/icon.svg" class="app-logo" alt="">
        <h1 class="app-title">WhatsNote</h1>
        <div class="sidebar-actions">
          <button id="theme-toggle" class="icon-btn" title="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button id="starred-btn" class="icon-btn" title="Starred messages">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/>
            </svg>
          </button>
          <button id="new-project-btn" class="icon-btn" title="New project">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search or start new project" autocomplete="off">
      </div>
      <div id="project-list"></div>
      <div class="sidebar-footer">
        <button id="export-btn" class="icon-btn footer-action" title="Export data">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button id="import-btn" class="icon-btn footer-action" title="Import data">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <span class="footer-divider"></span>
        <span class="footer-credit">Made by TayMcQuaya</span>
        <a class="footer-link" data-url="https://x.com/TayMcQuaya" title="Follow on X">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a class="footer-link" data-url="https://github.com/TayMcQuaya/WhatsNote" title="View on GitHub">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        </a>
      </div>
    </aside>

    <!-- Chat Area -->
    <main id="chat-area">
      <!-- Empty State -->
      <div id="empty-state">
        <div class="empty-content">
          <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
          <h2>WhatsNote</h2>
          <p>Select a project or create a new one to start adding tasks.</p>
        </div>
      </div>

      <!-- Active Chat -->
      <div id="active-chat" class="hidden">
        <div class="chat-header">
          <div class="chat-header-left">
            <div id="chat-avatar" class="chat-header-avatar"></div>
            <h2 id="chat-title"></h2>
          </div>
          <span id="chat-count" class="message-count"></span>
        </div>
        <div id="messages-container"></div>
        <div id="input-bar" class="input-bar">
          <textarea id="message-input" placeholder="Type a task..." rows="1" autocomplete="off"></textarea>
          <button id="send-btn" title="Send">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Project Info Window -->
  <div id="info-overlay" class="info-overlay hidden">
    <div id="info-backdrop" class="info-backdrop"></div>
    <div class="info-panel">
      <div class="info-panel-header">
      <button id="info-close-btn" class="icon-btn" title="Close">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <span class="info-panel-title">Project info</span>
    </div>
    <div class="info-panel-body">
      <div class="info-avatar-section">
        <div id="info-avatar" class="info-avatar" title="Click to change photo">
          <div class="info-avatar-overlay">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="2">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span>CHANGE<br>PHOTO</span>
          </div>
        </div>
        <div id="info-name" class="info-name"></div>
      </div>
      <div class="info-section">
        <label class="info-label">Description</label>
        <div class="info-description-wrapper">
          <textarea id="info-description" class="info-description" placeholder="Add a project description..." rows="3"></textarea>
        </div>
      </div>
      <div class="info-section info-stats">
        <div class="info-stat">
          <span class="info-stat-label">Tasks</span>
          <span id="info-total" class="info-stat-value">0</span>
        </div>
        <div class="info-stat">
          <span class="info-stat-label">Done</span>
          <span id="info-done" class="info-stat-value">0</span>
        </div>
        <div class="info-stat">
          <span class="info-stat-label">Created</span>
          <span id="info-created" class="info-stat-value"></span>
        </div>
      </div>
    </div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-overlay" class="info-overlay hidden">
    <div class="info-backdrop" id="confirm-backdrop"></div>
    <div class="confirm-dialog">
      <div class="confirm-body">
        <p id="confirm-message"></p>
        <p id="confirm-detail" class="confirm-detail"></p>
      </div>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="confirm-btn">Cancel</button>
        <button id="confirm-ok" class="confirm-btn confirm-btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
